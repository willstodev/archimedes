services:
  postgres:
    image: postgres:17-alpine
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: archimedes
      POSTGRES_USER: applies
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U applies -d archimedes"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
